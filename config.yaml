# HorseLink 配置模板
# 复制为 config.yaml 并根据实际情况修改

# Peer 名称（唯一标识）
name: cloud-horse

# Secret（所有连接的 Peer 必须使用相同密钥）
secret: change-this-to-a-real-secret

# 模式: relay 或 client
mode: relay

# Relay 模式配置
relay:
  host: 0.0.0.0
  port: 8765

# Client 模式配置
client:
  # Relay 的 WebSocket/WSS 地址
  # 内网: ws://...  公网: wss://...
  connect: wss://your-vps-public-ip:8765

# TLS 加密（公网部署必填）
tls:
  cert: /path/to/cert.pem
  key: /path/to/key.pem

# 安全防护
security:
  # IP 白名单（空=放行所有）
  allowed_ips:
    - 你的本地公网IP
  # 最大认证失败次数
  max_auth_fail: 5
